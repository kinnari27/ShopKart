name: shop_kart
description: A production-ready Flutter e-commerce app built with Clean Architecture, Riverpod, Dio, Hive, and Material 3.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  get_it: ^8.2.0
  go_router: ^16.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  infinite_scroll_pagination: ^5.1.1
  injectable: ^2.6.1
  json_annotation: ^4.9.0
  retrofit: ^4.9.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^2.11.0
  json_serializable: ^6.11.3
  mocktail: ^1.0.4
  retrofit_generator: ^10.2.0

flutter:
  uses-material-design: true
